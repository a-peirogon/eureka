version: "3.9"
# docker-compose.override.yml — Auto-loaded in development
# Adds: hot reload, Prometheus, Grafana, PgAdmin

services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DEBUG: "true"
      ENVIRONMENT: development
    volumes:
      - ./backend:/app

  # ── PgAdmin ───────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: icfes_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eureka.edu.co
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    profiles: [dev]

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: icfes_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    profiles: [monitoring]

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: icfes_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    profiles: [monitoring]
